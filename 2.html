<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豪華賭場 Bingo - 4-6開局/6輪版</title>
    <style>
        :root {
            --casino-gold: #f1c40f;
            --casino-dark-gold: #b59410;
            --casino-red: #e74c3c;
            --casino-dark-red: #c0392b;
            --casino-bg: #1a1a1a;
            --cell-bg: #2c3e50;
            --text-light: #ecf0f1;
            --cell-size: min(17vw, 65px);
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--casino-bg);
            background-image: radial-gradient(circle, #3d0000 0%, #1a1a1a 70%);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 450px; text-align: center; padding-top: 10px; }
        h1 { color: var(--casino-gold); text-transform: uppercase; text-shadow: 0 0 10px rgba(241, 196, 15, 0.7); margin-bottom: 15px; }

        /* 按鈕樣式 */
        button {
            padding: 12px 25px; font-size: 16px; font-weight: bold; cursor: pointer;
            border-radius: 50px; transition: 0.3s; border: none; text-transform: uppercase;
        }
        .primary-btn { background: linear-gradient(145deg, var(--casino-gold), var(--casino-dark-gold)); color: #222; box-shadow: 0 4px 15px rgba(241, 196, 15, 0.4); margin: 5px; }
        .reset-btn { background: linear-gradient(145deg, var(--casino-red), #c0392b); color: white; margin-top: 10px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- Host 抽號介面 --- */
        .slot-machine {
            background: black; border: 5px solid var(--casino-dark-gold); border-radius: 15px;
            padding: 10px; margin: 15px auto; width: 140px; height: 90px; overflow: hidden; position: relative;
            box-shadow: 0 0 30px rgba(181, 148, 16, 0.4);
        }
        .slot-number-container { position: absolute; top: 0; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .slot-number { font-size: 60px; font-weight: bold; color: var(--casino-gold); height: 90px; line-height: 90px; text-shadow: 0 0 10px var(--casino-gold); }

        .history-section { margin-top: 15px; padding: 12px; background: rgba(0,0,0,0.5); border-radius: 12px; border: 1px solid #333; text-align: left; }
        .section-title { font-size: 0.85em; color: var(--casino-gold); margin-bottom: 8px; border-left: 3px solid var(--casino-gold); padding-left: 8px; text-transform: uppercase; }
        .ball-container { display: flex; flex-wrap: wrap; gap: 8px; min-height: 40px; }
        .ball { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.4); animation: popIn 0.4s forwards; }
        .ball-start { background: linear-gradient(135deg, #f1c40f, #967d0a); color: #000; border: 1px solid #fff; }
        .ball-round { background: linear-gradient(135deg, #e74c3c, #82190f); color: #fff; border: 1px solid #ff7675; }

        /* --- Bingo 紙介面 --- */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 0 auto 15px; background: rgba(0,0,0,0.6); padding: 10px; border: 3px solid var(--casino-dark-gold); border-radius: 15px; }
        .cell { width: var(--cell-size); height: var(--cell-size); background: var(--cell-bg); border: 1px solid #444; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: calc(var(--cell-size) * 0.45); font-weight: bold; cursor: pointer; transition: 0.2s; color: white; }
        .cell.hit { background: linear-gradient(145deg, var(--casino-red), #961e12); border-color: #f39c12; box-shadow: 0 0 10px rgba(231, 76, 60, 0.6); }
        .cell.free { background: #111; color: #666; font-size: 12px; border: 1px dashed #444; }
        
        #status-bar { margin: 15px 0; padding: 12px; border-radius: 10px; font-weight: bold; background: rgba(0,0,0,0.8); border: 1px solid #333; color: #aaa; min-height: 24px; }
        .status-ready { color: #fff; border: 1px solid var(--casino-gold); box-shadow: 0 0 10px rgba(241, 196, 15, 0.5); text-shadow: 0 0 5px var(--casino-gold); }
        .status-bingo { color: #fff; background: rgba(231, 76, 60, 0.3); border: 2px solid var(--casino-red); box-shadow: 0 0 20px var(--casino-red); font-size: 1.1em; }

        .hidden { display: none !important; }
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>Casino Bingo</h1>

        <div id="main-menu" style="display:flex; flex-direction:column; gap: 10px;">
            <button class="primary-btn" onclick="initDrawMode()">💎 抽號模式 (Host)</button>
            <button class="primary-btn" style="background: #2c3e50; color: white;" onclick="initCardMode()">🃏 獲取 Bingo 紙</button>
        </div>

        <div id="draw-zone" class="hidden">
            <div id="round-text" style="color:var(--casino-gold); font-style: italic; margin-bottom:5px;">準備開桌...</div>
            <div class="slot-machine">
                <div class="slot-number-container" id="slot-container">
                    <div class="slot-number">?</div>
                </div>
            </div>
            <div id="draw-controls">
                <button id="action-btn" class="primary-btn" onclick="startCasinoGame()">✨ 啟動自動開局 (4-6球)</button>
            </div>
            <div class="history-section">
                <div class="section-title">起始號碼 (開局)</div>
                <div class="ball-container" id="start-numbers"></div>
            </div>
            <div class="history-section">
                <div class="section-title">正式回合 (共 6 輪)</div>
                <div class="ball-container" id="round-numbers"></div>
            </div>
            <button class="reset-btn" style="padding: 8px 20px; font-size: 14px; background: #444;" onclick="location.reload()">回主頁</button>
        </div>

        <div id="card-zone" class="hidden">
            <div class="grid" id="bingo-grid"></div>
            <div id="status-bar">點擊號碼標記</div>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="reset-btn" style="margin:0" onclick="initCardMode()">重新洗牌</button>
                <button style="background:#444; color:white;" onclick="location.reload()">回主頁</button>
            </div>
        </div>
    </div>

    <script>
        let pool = [];
        let manualRounds = 0;
        const MAX_MANUAL_ROUNDS = 6; // 修改為 6 輪
        const winLines = [];

        function initWinLines() {
            winLines.length = 0;
            for (let i = 0; i < 5; i++) winLines.push([i*5, i*5+1, i*5+2, i*5+3, i*5+4]);
            for (let i = 0; i < 5; i++) winLines.push([i, i+5, i+10, i+15, i+20]);
            winLines.push([0, 6, 12, 18, 24], [4, 8, 12, 16, 20]);
        }

        // --- Host 模式 ---
        function initDrawMode() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('draw-zone').classList.remove('hidden');
            pool = Array.from({length: 25}, (_, i) => i + 1);
            manualRounds = 0;
        }

        async function startCasinoGame() {
            const btn = document.getElementById('action-btn');
            btn.disabled = true;
            // 起始號碼改為 4-6 個
            const startCount = Math.floor(Math.random() * 3) + 4; 
            
            for (let i = 0; i < startCount; i++) {
                document.getElementById('round-text').innerText = `🔥 自動抽號中 (${i+1}/${startCount})`;
                const num = await performDrawAnimation();
                addBall('start-numbers', num, 'ball-start');
                await new Promise(r => setTimeout(r, 450));
            }
            
            document.getElementById('round-text').innerText = `開局完成！請進行 6 輪正式抽號`;
            btn.disabled = false;
            btn.innerText = `抽取第 1 輪號碼`;
            btn.onclick = manualDraw;
        }

        async function manualDraw() {
            if (manualRounds >= MAX_MANUAL_ROUNDS) return;
            manualRounds++;
            const btn = document.getElementById('action-btn');
            btn.disabled = true;
            document.getElementById('round-text').innerText = `正式回合：第 ${manualRounds} / ${MAX_MANUAL_ROUNDS}`;
            
            const num = await performDrawAnimation();
            addBall('round-numbers', num, 'ball-round');
            
            if (manualRounds < MAX_MANUAL_ROUNDS) {
                btn.disabled = false;
                btn.innerText = `抽取第 ${manualRounds + 1} 輪號碼`;
            } else {
                btn.innerText = "抽號結束";
                btn.style.background = "#555";
                document.getElementById('round-text').innerText = "🏁 本局 6 輪抽號已全部完成";
            }
        }

        function performDrawAnimation() {
            return new Promise(resolve => {
                const container = document.getElementById('slot-container');
                const steps = 12;
                const idx = Math.floor(Math.random() * pool.length);
                const finalNum = pool.splice(idx, 1)[0];
                let animNums = Array.from({length: steps}, () => Math.floor(Math.random() * 25) + 1);
                animNums[steps - 1] = finalNum;
                
                container.innerHTML = animNums.map(n => `<div class="slot-number">${n}</div>`).join('');
                container.style.transition = 'none';
                container.style.transform = 'translateY(0)';
                
                let current = 0;
                const timer = setInterval(() => {
                    current++;
                    if (current < steps) container.style.transform = `translateY(-${current * 90}px)`;
                    else { clearInterval(timer); resolve(finalNum); }
                }, 60);
            });
        }

        function addBall(id, num, cls) {
            const b = document.createElement('div');
            b.className = `ball ${cls}`;
            b.innerText = num;
            document.getElementById(id).appendChild(b);
        }

        // --- Bingo 紙模式 ---
        function initCardMode() {
            initWinLines();
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('card-zone').classList.remove('hidden');
            const grid = document.getElementById('bingo-grid');
            grid.innerHTML = '';
            let nums = Array.from({length: 25}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (i === 12) {
                    cell.innerText = 'FREE';
                    cell.classList.add('hit', 'free');
                } else {
                    cell.innerText = nums.pop();
                    cell.onclick = function() { this.classList.toggle('hit'); checkStatus(); };
                }
                grid.appendChild(cell);
            }
            checkStatus();
        }

        function checkStatus() {
            const cells = document.querySelectorAll('.cell');
            const statusBar = document.getElementById('status-bar');
            let bingoCount = 0;
            let readyNums = new Set();
            winLines.forEach(line => {
                const hits = line.filter(idx => cells[idx].classList.contains('hit'));
                if (hits.length === 5) bingoCount++;
                else if (hits.length === 4) {
                    const missIdx = line.find(idx => !cells[idx].classList.contains('hit'));
                    readyNums.add(cells[missIdx].innerText);
                }
            });
            if (bingoCount > 0) {
                statusBar.innerText = `🎉 Bingo! 已達成 ${bingoCount} 條連線！`;
                statusBar.className = "status-bingo";
            } else if (readyNums.size > 0) {
                statusBar.innerText = `⚡ 聽牌！差：${Array.from(readyNums).join(', ')}`;
                statusBar.className = "status-ready";
            } else {
                statusBar.innerText = "點擊標記號碼";
                statusBar.className = "";
            }
        }
    </script>
</body>
</html>
